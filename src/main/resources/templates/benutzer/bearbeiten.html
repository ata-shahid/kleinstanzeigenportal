<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Benutzer bearbeiten</title>
    <link rel="stylesheet" th:href="@{/styles.css}" href="/styles.css" />
  </head>
  <body>
    <div class="main-container">
      <h1>Benutzer <span th:text="${loginname}">xyz</span> bearbeiten...</h1>

      <form
        class="form-container"
        th:action="@{/admin/benutzer/{ln}(ln=${loginname})}"
        method="POST"
        th:object="${formular}"
      >
        <div class="form-row">
          <label for="name">Name</label>
          <input type="text" th:field="*{name}" />
        </div>

        <div class="form-row">
          <label for="email">E-Mail</label>
          <input type="email" th:field="*{email}" />
        </div>

        <div class="form-row">
          <label for="adresse">Adresse</label>
          <input type="text" th:field="*{adresse}" />
        </div>

        <div class="form-row">
          <label for="rolle">Rolle</label>
          <select th:field="*{rolle}">
            <option value="">-- bitte wählen --</option>
            <option value="ADMINISTRATOR">Administrator</option>
            <option value="ANBIETER">Anbieter</option>
            <option value="TESTER">Tester</option>
          </select>
        </div>

        <div class="form-row">
          <label for="passwort">Passwort</label>
          <input type="password" th:field="*{passwort}" />
        </div>

        <div class="form-row">
          <label for="passwortWiederholung">Passwort (Wiederholung)</label>
          <input type="password" th:field="*{passwortWiederholung}" />
        </div>

        <div class="checkbox-row">
          <input type="checkbox" th:field="*{aktiviert}" />
          <label for="aktiviert">Aktiviert</label>
        </div>

        <div class="button-row">
          <button id="cancel-btn" type="button">Abbruch</button>
          <button id="ok-btn" type="submit">OK</button>
        </div>
      </form>
    </div>
  </body>
</html>
